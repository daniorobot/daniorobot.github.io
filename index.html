<!DOCTYPE html> 
<html lang="pl"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
    <title>DNRBT</title> 
    <style> 
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 

        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            font-weight: bold; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            min-height: 100dvh; 
            overflow: hidden; 
            user-select: none; 
            -webkit-font-smoothing: antialiased; 
            background-color: #ffffff; 
            color: rgba(212, 235, 216, 0.32); 
            transition: background-color 2.5s cubic-bezier(0.4, 0, 0.2, 1), color 2s ease-in-out; 
        } 

        body.is-night { 
            background-color: #020302 !important; 
            transition: none !important; 
        } 

        .poster-layout { 
            position: relative; 
            width: 100%; 
            max-width: 440px; 
            height: 88vh; 
            height: 88dvh; 
            min-height: 580px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            text-align: center; 
        } 

        .star { 
            position: absolute; 
            font-size: 3.5rem; 
            line-height: 1; 
            transition: text-shadow 2s ease-in-out, color 2s ease-in-out; 
        } 
        .top-left     { top: 10px; left: 10px; } 
        .top-right    { top: 10px; right: 10px; } 
        .mid-left     { top: 28%; left: 10px; } 
        .mid-right    { top: 28%; right: 10px; } 
        .bottom-left  { bottom: 10px; left: 10px; } 
        .bottom-right { bottom: 10px; right: 10px; } 

        .main-title { 
            font-size: 5rem; 
            letter-spacing: -2px; 
            line-height: 0.9; 
            margin-top: 80px; 
            transition: text-shadow 2s ease-in-out, color 2s ease-in-out; 
        } 

        .socials-list { 
            display: flex; 
            flex-direction: column; 
            gap: 35px; 
            width: 100%; 
        } 

        .text-link { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            font-weight: bold; 
            font-size: 2.6rem; 
            line-height: 1; 
            text-decoration: none; 
            letter-spacing: -0.5px; 
            background: none; 
            border: none; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent; 
            color: rgba(212, 235, 216, 0.32); 
            transition: color 2s ease, text-shadow 2s ease, transform 0.25s ease; 
        } 

        .footer-stamp { 
            font-size: 2.2rem; 
            letter-spacing: -0.5px; 
            line-height: 1; 
            margin-bottom: 10px; 
            transition: text-shadow 2s ease-in-out, color 2s ease-in-out; 
        } 

        body.dark-glow { 
            background-color: #030503; 
        } 

        body.dark-glow .main-title, 
        body.dark-glow .star, 
        body.dark-glow .footer-stamp { 
            color: #b3ffbe; 
            text-shadow: 0 0 10px rgba(85, 255, 102, 0.6), 0 0 25px rgba(85, 255, 102, 0.3), 0 0 50px rgba(85, 255, 102, 0.15); 
        } 

        body.dark-glow .text-link { 
            color: rgba(120, 255, 135, 0.45); 
            text-shadow: 0 0 12px rgba(85, 255, 102, 0.3); 
        } 

        body.dark-glow.faded .main-title, 
        body.dark-glow.faded .star, 
        body.dark-glow.faded .footer-stamp { 
            color: #142b18; 
            text-shadow: 0 0 4px rgba(85, 255, 102, 0.15); 
            transition: color 35s cubic-bezier(0.25, 1, 0.5, 1), text-shadow 35s cubic-bezier(0.25, 1, 0.5, 1); 
        } 

        body.dark-glow.faded .text-link { 
            color: rgba(40, 90, 50, 0.2); 
            text-shadow: 0 0 2px rgba(85, 255, 102, 0.08); 
            transition: color 35s cubic-bezier(0.25, 1, 0.5, 1), text-shadow 35s cubic-bezier(0.25, 1, 0.5, 1), transform 0.25s ease; 
        } 

        @media (hover: hover) { 
            body.dark-glow .text-link:hover, 
            body.dark-glow.faded .text-link:hover { 
                color: #ffffff; 
                transform: scale(1.04); 
                text-shadow: 0 0 6px #ffffff, 0 0 15px rgba(85, 255, 102, 0.9), 0 0 35px rgba(85, 255, 102, 0.6), 0 0 70px rgba(85, 255, 102, 0.3); 
                transition: color 0.1s ease, text-shadow 0.1s ease, transform 0.2s ease; 
            } 
        } 

        body.dark-glow .text-link:active { 
            opacity: 0.5; 
            transform: scale(0.98); 
        } 

        @media (max-width: 360px) {
            .main-title { font-size: 4.2rem; }
            .text-link { font-size: 2.2rem; }
            .star { font-size: 2.8rem; }
        }
    </style> 
</head> 
<body> 

    <div class="poster-layout"> 
        <div class="star top-left">★</div> 
        <div class="star top-right">★</div> 
        <div class="star mid-left">★</div> 
        <div class="star mid-right">★</div> 
        <div class="star bottom-left">★</div> 
        <div class="star bottom-right">★</div> 

        <h1 class="main-title">DNRBT</h1> 

        <nav class="socials-list"> 
            <button class="text-link" onclick="window.open('https://www.tiktok.com/@daniocoin', '_blank')">TIKTOK</button> 
            <button class="text-link" onclick="window.open('https://www.instagram.com/daniocoin', '_blank')">INSTAGRAM</button> 
            <button class="text-link" onclick="window.open('https://youtube.com/@daniorobot', '_blank')">YOUTUBE</button> 
        </nav> 

        <div class="footer-stamp" id="live-date">--.--.----</div> 
    </div> 

    <script> 
        const now = new Date(); 
        const isDay = now.getHours() >= 6 && now.getHours() < 20; 

        if (!isDay) { 
            document.body.classList.add('is-night', 'dark-glow', 'faded'); 
        } 

        document.addEventListener("DOMContentLoaded", () => { 
            const d = String(now.getDate()).padStart(2, '0'); 
            const m = String(now.getMonth() + 1).padStart(2, '0'); 
            document.getElementById("live-date").textContent = `${d}.${m}.${now.getFullYear()}`; 

            if (isDay) { 
                setTimeout(() => { document.body.classList.add('dark-glow'); }, 1000); 
                setTimeout(() => { document.body.classList.add('faded'); }, 41000); 
            } 
        }); 
    </script> 

</body> 
</html>
